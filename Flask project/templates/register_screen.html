<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Team 3D</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        body {
          font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
          background-color: #f0f0f0;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 1rem;
        }
        
        .register-container {
          background-color: white;
          border-radius: 12px;
          padding: 2rem;
          max-width: 400px;
          width: 100%;
          box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .register-header {
          text-align: center;
          margin-bottom: 2rem;
        }
        
        .register-header h1 {
          font-size: 1.8rem;
          color: #003d7a;
          font-weight: bold;
          margin-bottom: 0.5rem;
        }
        
        .register-header p {
          font-size: 0.9rem;
          color: #666;
        }
        
        form {
          display: grid;
          gap: 1rem;
        }
        
        label {
          display: block;
          font-weight: 600;
          color: #003d7a;
          margin-bottom: 0.5rem;
          font-size: 0.95rem;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"] {
          padding: 0.75rem;
          font-size: 1rem;
          width: 100%;
          border: 1px solid #ddd;
          border-radius: 6px;
          transition: border-color 0.3s ease;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
          outline: none;
          border-color: #003d7a;
          box-shadow: 0 0 0 3px rgba(0, 61, 122, 0.1);
        }
        
        button {
          padding: 0.75rem;
          font-size: 1rem;
          cursor: pointer;
          border: none;
          border-radius: 6px;
          font-weight: 600;
          transition: background-color 0.3s ease;
        }
        
        button[type="submit"] {
          background-color: #003d7a;
          color: white;
        }
        
        button[type="submit"]:hover {
          background-color: #002d5a;
        }
        
        .divider {
          text-align: center;
          color: #999;
          font-size: 0.9rem;
          margin: 1rem 0;
        }
        
        .google-signup-btn {
          background-color: #f5f5f5;
          color: #333;
          border: 1px solid #ddd;
        }
        
        .google-signup-btn:hover {
          background-color: #e8e8e8;
        }
        
        .error {
          margin-top: 1rem;
          padding: 0.75rem;
          background-color: #fee;
          border: 1px solid #fcc;
          border-radius: 6px;
          color: #c33;
          font-size: 0.9rem;
          text-align: center;
          display: none;
        }
        
        .login-link {
          text-align: center;
          margin-top: 1.5rem;
          font-size: 0.9rem;
          color: #666;
        }
        
        .login-link a {
          color: #007bff;
          text-decoration: none;
          font-weight: 600;
        }
        
        .login-link a:hover {
          text-decoration: underline;
        }
        
        @media (max-width: 480px) {
          .register-container {
            padding: 1.5rem;
          }
          
          .register-header h1 {
            font-size: 1.5rem;
          }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>Team 3D</h1>
            <p>Create your account</p>
        </div>
        
        <form id="register-form" method="POST">
            <label for="fullname">
                Full Name
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required />
            </label>

            <label for="email">
                Email
                <input type="email" id="email" name="email" placeholder="Enter your email" required />
            </label>

            <label for="username">
                Username
                <input type="text" id="username" name="username" placeholder="Choose a username" required />
            </label>

            <label for="password">
                Password
                <input type="password" id="password" name="password" placeholder="Create a password" required />
            </label>

            <label for="confirm-password">
                Confirm Password
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required />
            </label>

            <button type="submit">Sign Up</button>

            <div class="divider">or</div>

            <button type="button" class="google-signup-btn" onclick="signupWithGoogle()">
                🔵 Sign up with Google
            </button>

            <div id="error-message" class="error"></div>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
