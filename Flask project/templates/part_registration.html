<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Part Registration</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<header>
    {% include 'header.html' %}
</header>

<body>
    <h1>Part Registration</h1>

    <h2>Upload a part to be shown to others.</h2>

    <section>
        <h3>Manual Entry:</h3>
        <p>Enter relevant information about your product.</p>
        <form> <!--Subject to change depending on DB-->
            <label>
                <p>Brand: <input id="brand"></input></p>
            </label>
            <label>
                <p>Year: <input id="year"></input></p>
            </label>
            <label>
                <p>Name: <input id="part_name"></input></p>
            </label>
            <label>
                <p>Price: £<input id="price" type="number"></input></p>
            </label>
            <label>
                <p>Description: <input id="description"></input></p>
            </label>
            <label>
                <p>Image: 
                    <select id="image" onchange="display_image()">
                        <option value="">-- Select an image --</option>
                        <option value="car-battery">car-battery</option>
                        <option value="brake-disc">brake-disc</option>
                        <option value="oil-filter">oil-filter</option>
                        <option value="headlight">headlight</option>
                        <option value="filter">filter</option>
                        <option value="windshield-wiper">windshield-wiper</option>
                        <option value="exhaust">exhaust</option>
                        <option value="tyre">tyre</option>
                    </select>
                </p>
            </label>
            <div id="image-preview" style="margin-top: 1rem;">
                <img id="preview-img" src="" alt="Image preview" style="display: none; max-width: 200px; max-height: 200px;">
            </div>
        </form>
        <button id="manual_confirm" onclick="save_part_registration()"> <!--Onpressed = validate then add to DB-->
            Confirm Registration
        </button>
    </section>
    <p id="errors"></p>
</body>

<footer>
    {% include 'footer.html' %}
</footer>

<script>

    // Display the selected image
    function display_image() {
        const selectedValue = document.getElementById("image").value;
        const previewImg = document.getElementById("preview-img");
        
        if (selectedValue) {
            previewImg.src = `/static/images/${selectedValue}.png`;
            previewImg.style.display = "block";
        } else {
            previewImg.style.display = "none";
        }
    }

    // TODO: Add more error checks depending on the DB
    function verify_data(data) {
        for (const item in data) {
            if (data[item].length == 0) {
                return "Fields must not be empty"
            }
        }
        return ""
    }

    function save_part_registration() {
        const errorHandler = document.getElementById("errors");

        const data = {
            // TODO: Get the user ID too
            brand: document.getElementById("brand").value,
            year: document.getElementById("year").value,
            part_name: document.getElementById("part_name").value,
            price: document.getElementById("price").value,
            description: document.getElementById("description").value,
            image: document.getElementById("image").value
        };

        const errors = verify_data(data);

        if (!errors) {
            axios.post("/api/save_part_registration", data);

            errorHandler.textContent = "Part added!"

            document.getElementById("brand").value = "";
            document.getElementById("year").value = "";
            document.getElementById("part_name").value = "";
            document.getElementById("price").value = "";
            document.getElementById("description").value = "";
            document.getElementById("image").value = "";
            display_image();
        } else {
            errorHandler.textContent = errors;
        }
    }
</script>
