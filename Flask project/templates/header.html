<section id="commonHeader">
    <div class="headerRow">
        <img src="{{ url_for('static', filename='images/autoPartFinderLogo.png') }}" alt="AutoPartFinder logo">

        <h1>AutoPartFinder</h1>

        <a href="{{ url_for('home') }}" class="headerButton">Home</a>

        <div class="search-wrapper">
            <input id="headerSearch" placeholder="Search car parts..." autocomplete="off"></input>
            <div id="searchDropdown" class="search-dropdown"></div>
        </div>
        <button id="searchBtn">Search</button>

        <a href="{{ url_for('account') }}" class="headerButton">Account</a>

        {% if session.get('authenticated') %}
        <a href="{{ url_for('view_cart') }}" class="headerButton cartButton" id="cartButton">
          🛒 Cart <span class="cart-count" id="cartCount">0</span>
        </a>
        {% endif %}

        <button id="burgerButton" type="button" onclick="hideBurger()">▶</button>
    </div>
    <section id="burgerMenu">
        <section>
            <p>Jump to another page</p>
            <section id="headerAccounts">
                <p>Must be logged in</p>
                <p><a href="{{ url_for('account') }}">Account</a></p>
                {% if session.get('authenticated') %}
                <p><a href="{{ url_for('view_cart') }}">Shopping Cart</a></p>
                {% endif %}
                <p><a href="{{ url_for('my_orders') }}">Orders</a></p>
                <p><a href="{{ url_for('car_registration_screen') }}">Car Registration</a></p>
                <p><a href="{{ url_for('part_registration_screen') }}">Part Registration</a></p>
                <p style="margin-top: 1rem; border-top: 1px solid #ddd; padding-top: 1rem;">
                    <a href="{{ url_for('admin_login_page') }}" style="color: #c33; font-weight: bold;">🔐 Admin Login</a>
                </p>
            </section>
        </section>
    </section>
</section>

<script>
    let burgerMenu = document.getElementById("burgerMenu");
    let burgerButton = document.getElementById("burgerButton");

    burgerMenu.hidden = true
    burgerButton.textContent = "▶"

    function hideBurger() {
        burgerMenu.hidden = !burgerMenu.hidden
        burgerButton.textContent = burgerMenu.hidden ? "▶" : "▼"
    }

    // Update cart count in header
    async function updateCartCount() {
        const cartCountElement = document.getElementById('cartCount');
        if (!cartCountElement) return; // Cart button only shows for logged-in users

        try {
            const response = await fetch('/api/cart');
            if (response.ok) {
                const data = await response.json();
                cartCountElement.textContent = data.count || 0;
            }
        } catch (error) {
            console.error('Error updating cart count:', error);
        }
    }

    // Update cart count when page loads
    document.addEventListener('DOMContentLoaded', updateCartCount);

    // Listen for custom event to update cart when item is added
    document.addEventListener('cartUpdated', updateCartCount);

    // ===== LIVE SEARCH FUNCTIONALITY =====
    const searchInput = document.getElementById('headerSearch');
    const searchDropdown = document.getElementById('searchDropdown');
    const searchBtn = document.getElementById('searchBtn');
    let searchTimeout;

    // Live search as user types
    searchInput.addEventListener('input', function() {
        const query = this.value.trim();

        // Clear previous timeout
        clearTimeout(searchTimeout);

        if (query.length < 2) {
            searchDropdown.style.display = 'none';
            return;
        }

        // Debounce search - wait 300ms before searching
        searchTimeout = setTimeout(async () => {
            try {
                const response = await fetch(`/api/parts/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.success && data.products.length > 0) {
                    displaySearchResults(data.products.slice(0, 8)); // Show max 8 results
                } else {
                    searchDropdown.innerHTML = '<div class="search-no-results">No parts found</div>';
                    searchDropdown.style.display = 'block';
                }
            } catch (error) {
                console.error('Search error:', error);
                searchDropdown.innerHTML = '<div class="search-error">Error searching</div>';
                searchDropdown.style.display = 'block';
            }
        }, 300);
    });

    // Handle Enter key to go to search results
    searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            goToSearchResults();
        }
    });

    // Search button click
    searchBtn.addEventListener('click', goToSearchResults);

    function displaySearchResults(products) {
        let html = '<div class="search-results">';
        products.forEach(product => {
            const sellerInfo = product.seller
                ? `<div class="search-result-seller"><span class="stars">★ ${product.seller.rating}</span> by ${product.seller.name}</div>`
                : '';
            html += `
                <div class="search-result-item" onclick="viewProductDetail(${product.id})">
                    <div style="flex: 1;">
                        <div class="search-result-name">${product.name}</div>
                        ${sellerInfo}
                    </div>
                    <div class="search-result-price">£${product.price}</div>
                </div>
            `;
        });
        html += '</div>';
        searchDropdown.innerHTML = html;
        searchDropdown.style.display = 'block';
    }

    function viewProductDetail(productId) {
        window.location.href = `/product-page?id=${productId}`;
    }

    function goToSearchResults(selectedQuery) {
        const query = selectedQuery || document.getElementById('headerSearch').value.trim();
        if (query.length > 0) {
            window.location.href = `/search-results?q=${encodeURIComponent(query)}`;
        }
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-wrapper') && !e.target.closest('#searchBtn')) {
            searchDropdown.style.display = 'none';
        }
    });
</script>
