<script>
    let burgerMenu = document.getElementById("burgerMenu");
    let burgerButton = document.getElementById("burgerButton");

    burgerMenu.hidden = true;
    burgerButton.textContent = "▶";

    function hideBurger() {
        burgerMenu.hidden = !burgerMenu.hidden;
        burgerButton.textContent = burgerMenu.hidden ? "▶" : "▼";
    }

    // Header Filters Dropdown Functionality
    const headerFiltersBtn = document.getElementById('headerFiltersBtn');
    const headerFiltersDropdown = document.getElementById('headerFiltersDropdown');
    const headerSearchInput = document.getElementById('headerSearch');
    const headerClearBtn = document.getElementById('headerClearBtn');
    const headerResetBtn = document.getElementById('headerResetBtn');
    const headerSortBtns = document.querySelectorAll('.header-sort-btn');
    const headerFilterCheckboxes = document.querySelectorAll('.header-filter-option input[type="checkbox"]');

    // Toggle dropdown on button click
    headerFiltersBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        headerFiltersBtn.classList.toggle('active');
        headerFiltersDropdown.classList.toggle('active');
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        if (!headerFiltersBtn.contains(e.target) && !headerFiltersDropdown.contains(e.target)) {
            headerFiltersBtn.classList.remove('active');
            headerFiltersDropdown.classList.remove('active');
        }
    });

    // Prevent closing when clicking inside the dropdown
    headerFiltersDropdown.addEventListener('click', (e) => {
        e.stopPropagation();
    });

    // Reset button functionality
    if (headerResetBtn) {
        headerResetBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (window.productSearchFilter) {
                window.productSearchFilter.resetFilters();
                console.log('All filters reset');
            }
        });
    }
</script>
