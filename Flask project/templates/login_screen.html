<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Team 3D</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        body {
          font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
          background-color: #f0f0f0;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 1rem;
        }
        
        .login-container {
          background-color: white;
          border-radius: 12px;
          padding: 2rem;
          max-width: 400px;
          width: 100%;
          box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .login-header {
          text-align: center;
          margin-bottom: 2rem;
        }
        
        .login-header h1 {
          font-size: 1.8rem;
          color: #003d7a;
          font-weight: bold;
          margin-bottom: 0.5rem;
        }
        
        .login-header p {
          font-size: 0.9rem;
          color: #666;
        }
        
        form {
          display: grid;
          gap: 1rem;
        }
        
        label {
          display: block;
          font-weight: 600;
          color: #003d7a;
          margin-bottom: 0.5rem;
          font-size: 0.95rem;
        }
        
        input[type="text"],
        input[type="password"] {
          padding: 0.75rem;
          font-size: 1rem;
          width: 100%;
          border: 1px solid #ddd;
          border-radius: 6px;
          transition: border-color 0.3s ease;
        }
        
        input[type="text"]:focus,
        input[type="password"]:focus {
          outline: none;
          border-color: #003d7a;
          box-shadow: 0 0 0 3px rgba(0, 61, 122, 0.1);
        }
        
        button {
          padding: 0.75rem;
          font-size: 1rem;
          cursor: pointer;
          border: none;
          border-radius: 6px;
          font-weight: 600;
          transition: background-color 0.3s ease;
        }
        
        button[type="submit"] {
          background-color: #003d7a;
          color: white;
        }
        
        button[type="submit"]:hover {
          background-color: #002d5a;
        }
        
        .divider {
          text-align: center;
          color: #999;
          font-size: 0.9rem;
          margin: 1rem 0;
        }
        
        .google-login-btn {
          background-color: #f5f5f5;
          color: #333;
          border: 1px solid #ddd;
        }
        
        .google-login-btn:hover {
          background-color: #e8e8e8;
        }
        
        .error {
          margin-top: 1rem;
          padding: 0.75rem;
          background-color: #fee;
          border: 1px solid #fcc;
          border-radius: 6px;
          color: #c33;
          font-size: 0.9rem;
          text-align: center;
        }
        
        .signup-link {
          text-align: center;
          margin-top: 1.5rem;
          font-size: 0.9rem;
          color: #666;
        }
        
        .signup-link a {
          color: #007bff;
          text-decoration: none;
          font-weight: 600;
        }
        
        .signup-link a:hover {
          text-decoration: underline;
        }
        
        @media (max-width: 480px) {
          .login-container {
            padding: 1.5rem;
          }
          
          .login-header h1 {
            font-size: 1.5rem;
          }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Team 3D</h1>
            <p>Login to your account</p>
        </div>
        
        <form id="login-form" method="POST">
            <label for="username">
                Username
                <input type="text" id="username" name="username" placeholder="Enter your username" required />
            </label>

            <label for="password">
                Password
                <input type="password" id="password" name="password" placeholder="Enter your password" required />
            </label>

            <button type="submit">Login</button>

            <div class="divider">or</div>

            <button type="button" class="google-login-btn" onclick="loginWithGoogle()">
                🔵 Login with Google
            </button>

            <div id="error-message" class="error" style="display: none;"></div>
        </form>
        
        <div class="signup-link">
            Don't have an account? <a href="/register">Sign up here</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGQVog5DLCAjkG2q54LeMuEdFCt41wd0g",
            authDomain: "team-3d.firebaseapp.com",
            projectId: "team-3d",
            storageBucket: "team-3d.firebasestorage.app",
            messagingSenderId: "538171239877",
            appId: "1:538171239877:web:69f49c90fe383873316fac",
            measurementId: "G-J2C6DCV2WD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Handle form submission
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("error-message");
            
            try {
                // Sign in with email and password
                const userCredential = await signInWithEmailAndPassword(auth, username, password);
                console.log("User logged in:", userCredential.user);
                
                // Get ID token and authenticate with backend
                const token = await userCredential.user.getIdToken();
                const response = await fetch("/api/authenticate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ token: token })
                });
                
                if (response.ok) {
                    window.location.href = "/account";
                } else {
                    const data = await response.json();
                    errorMsg.textContent = data.error || "Authentication failed";
                    errorMsg.style.display = "block";
                }
            } catch (error) {
                console.error("Login error:", error);
                errorMsg.textContent = "Login failed: " + error.message;
                errorMsg.style.display = "block";
            }
        });

        window.loginWithGoogle = function() {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("User logged in:", result.user);
                    result.user.getIdToken().then(token => {
                        fetch("/api/authenticate", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({ token: token })
                        }).then(res => {
                            if (res.ok) window.location.href = "/account";
                        });
                    });
                })
                .catch((error) => {
                    const errorMsg = document.getElementById("error-message");
                    errorMsg.textContent = "Login failed: " + error.message;
                    errorMsg.style.display = "block";
                });
        };
    </script>
</body>
</html>
