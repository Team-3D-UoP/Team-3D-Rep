<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Team 3D</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        body {
          font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
          background-color: #f0f0f0;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 1rem;
        }
        
        .login-container {
          background-color: white;
          border-radius: 12px;
          padding: 2rem;
          max-width: 400px;
          width: 100%;
          box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .login-header {
          text-align: center;
          margin-bottom: 2rem;
        }
        
        .login-header h1 {
          font-size: 1.8rem;
          color: #003d7a;
          font-weight: bold;
          margin-bottom: 0.5rem;
        }
        
        .login-header p {
          font-size: 0.9rem;
          color: #666;
        }
        
        form {
          display: grid;
          gap: 1rem;
        }
        
        label {
          display: block;
          font-weight: 600;
          color: #003d7a;
          margin-bottom: 0.5rem;
          font-size: 0.95rem;
        }
        
        input[type="text"],
        input[type="password"] {
          padding: 0.75rem;
          font-size: 1rem;
          width: 100%;
          border: 1px solid #ddd;
          border-radius: 6px;
          transition: border-color 0.3s ease;
        }
        
        input[type="text"]:focus,
        input[type="password"]:focus {
          outline: none;
          border-color: #003d7a;
          box-shadow: 0 0 0 3px rgba(0, 61, 122, 0.1);
        }
