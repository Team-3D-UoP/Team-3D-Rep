{% extends "base.html" %}

{% block title %}Home - Team 3D{% endblock %}

{% block content %}
<style>
  body {
    background-color: #f0f0f0;
  }
  
  .content-card {
    background-color: white;
    border-radius: 12px;
    padding: 2rem;
    max-width: 800px;
    margin: 2rem auto;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }
  
  @media (max-width: 768px) {
    .content-card {
      margin: 1rem;
      padding: 1.5rem;
    }
  }
  
  .heading-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    font-size: 1.1rem;
  }
  
  .checkmark {
    color: #28a745;
    font-weight: bold;
  }
  
  .car-model {
    font-weight: bold;
  }
  
  .change-link {
    color: #007bff;
    cursor: pointer;
    text-decoration: none;
    font-size: 0.9rem;
    margin-left: auto;
  }
  
  .change-link:hover {
    text-decoration: underline;
  }
</style>

<div class="content-card">
  <div class="heading-row">
    <span>Popular parts for your <span class="checkmark">✓</span> <span class="car-model">Peugeot 2008 2018</span></span>
    <a href="#" class="change-link">Change</a>
  </div>
</div>
{% endblock %}
