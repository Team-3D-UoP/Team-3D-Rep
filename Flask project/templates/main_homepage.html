{% extends "base.html" %}

{% block title %}Home - Team 3D{% endblock %}

{% block content %}
<style>
  body {
    background-color: #f0f0f0;
  }
  
  .content-card {
    background-color: white;
    border-radius: 12px;
    padding: 2rem;
    max-width: 800px;
    margin: 2rem auto;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }
  
  @media (max-width: 768px) {
    .content-card {
      margin: 1rem;
      padding: 1.5rem;
    }
  }
  
  .heading-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1.5rem;
    font-size: 1.1rem;
    flex-wrap: wrap;
  }
  
  .checkmark {
    color: #28a745;
    font-weight: bold;
  }
  
  .car-model {
    font-weight: bold;
  }
  
  .change-link {
    color: #007bff;
    cursor: pointer;
    text-decoration: none;
    font-size: 0.9rem;
    margin-left: auto;
  }
  
  .change-link:hover {
    text-decoration: underline;
  }
  
  .view-all-btn {
    background-color: #003d7a;
    color: white;
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem;
    white-space: nowrap;
  }
  
  .view-all-btn:hover {
    background-color: #002d5a;
  }
  
  @media (max-width: 768px) {
    .heading-row {
      flex-direction: column;
      align-items: flex-start;
    }
    
    .view-all-btn {
      width: 100%;
      text-align: center;
    }
  }
</style>

<div class="content-card">
  <div class="heading-row">
    <span>Popular parts for your <span class="checkmark">✓</span> <span class="car-model">Peugeot 2008 2018</span> <a href="#" class="change-link">Change</a></span>
    <button class="view-all-btn">View All Parts</button>
  </div>
</div>
{% endblock %}
