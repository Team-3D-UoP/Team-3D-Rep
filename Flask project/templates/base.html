<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team 3D{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            min-height: 300px;
        }

    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include "footer.html" %}

</body>
</html>
