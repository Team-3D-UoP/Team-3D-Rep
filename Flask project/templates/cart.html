{% extends "base.html" %}

{% block title %}Shopping Cart - Team 3D{% endblock %}

{% block content %}
<style>
  .cart-container {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
  }

  .cart-breadcrumb {
    margin-bottom: 2rem;
    font-size: 0.9rem;
  }

  .cart-breadcrumb a {
    color: #007bff;
    text-decoration: none;
  }

  .cart-breadcrumb a:hover {
    text-decoration: underline;
  }

  .cart-title {
    font-size: 2rem;
    color: #003d7a;
    font-weight: bold;
    margin-bottom: 2rem;
  }

  .cart-content {
    display: grid;
    grid-template-columns: 1fr 350px;
    gap: 2rem;
    margin-bottom: 2rem;
  }

  .cart-items-section {
    background: white;
    border-radius: 12px;
    padding: 2rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .empty-cart {
    text-align: center;
    padding: 3rem 1rem;
    color: #666;
  }

  .empty-cart-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }

  .empty-cart-text {
    font-size: 1.2rem;
    margin-bottom: 1.5rem;
  }

  .continue-shopping-btn {
    background-color: #003d7a;
    color: white;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background-color 0.3s ease;
  }

  .continue-shopping-btn:hover {
    background-color: #002d5a;
  }

  .cart-item {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    gap: 1.5rem;
    align-items: center;
    padding: 1.5rem;
    border-bottom: 1px solid #e0e0e0;
  }

  .cart-item:last-child {
    border-bottom: none;
  }

  .cart-item-image {
    width: 100px;
    height: 100px;
    background-color: #f9f9f9;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .cart-item-image img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .cart-item-details {
    flex: 1;
  }

  .cart-item-name {
    font-weight: bold;
    color: #003d7a;
    font-size: 1.05rem;
    margin-bottom: 0.5rem;
  }

  .cart-item-name-link {
    color: inherit;
    text-decoration: none;
  }

  .cart-item-name-link:hover {
    text-decoration: underline;
  }

  .cart-item-price {
    color: #28a745;
    font-weight: bold;
    font-size: 1.1rem;
    margin-bottom: 0.75rem;
  }

  .cart-item-controls {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .quantity-control {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .quantity-btn {
    background-color: #f0f0f0;
    border: 1px solid #ddd;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
  }

  .quantity-btn:hover {
    background-color: #e0e0e0;
  }

  .quantity-input {
    width: 50px;
    text-align: center;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 0.25rem;
    font-size: 0.95rem;
  }

  .remove-btn {
    background-color: #dc3545;
    color: white;
    border: none;
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background-color 0.3s ease;
  }

  .remove-btn:hover {
    background-color: #c82333;
  }

  .cart-summary {
    background: white;
    border-radius: 12px;
    padding: 2rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    height: fit-content;
    position: sticky;
    top: 2rem;
  }

  .summary-title {
    font-size: 1.25rem;
    color: #003d7a;
    font-weight: bold;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid #f0f0f0;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    font-size: 0.95rem;
  }

  .summary-label {
    color: #666;
  }

  .summary-value {
    color: #003d7a;
    font-weight: bold;
  }

  .summary-divider {
    border-top: 1px solid #f0f0f0;
    margin: 1rem 0;
  }

  .summary-total {
    font-size: 1.3rem;
    color: #28a745;
  }

  .checkout-btn {
    width: 100%;
    background-color: #28a745;
    color: white;
    border: none;
    padding: 1rem;
    border-radius: 6px;
    font-size: 1.05rem;
    font-weight: bold;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: background-color 0.3s ease;
  }

  .checkout-btn:hover {
    background-color: #218838;
  }

  .continue-btn {
    width: 100%;
    background-color: #003d7a;
    color: white;
    border: none;
    padding: 0.75rem;
    border-radius: 6px;
    font-size: 0.95rem;
    cursor: pointer;
    margin-top: 0.75rem;
    transition: background-color 0.3s ease;
  }

  .continue-btn:hover {
    background-color: #002d5a;
  }

  .loading {
    text-align: center;
    padding: 2rem;
    color: #666;
  }

  .spinner {
    border: 3px solid #f3f3f3;
    border-top: 3px solid #003d7a;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 1rem;
  }
