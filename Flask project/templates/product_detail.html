{% extends "base.html" %}

{% block title %}{{ product.name }} - Team 3D{% endblock %}

{% block content %}
<style>
  .product-detail-container {
    max-width: 1200px;
    margin: 2rem auto;
    background-color: white;
    border-radius: 12px;
    padding: 2rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .breadcrumb {
    margin-bottom: 2rem;
    font-size: 0.9rem;
  }

  .breadcrumb a {
    color: #007bff;
    text-decoration: none;
  }

  .breadcrumb a:hover {
    text-decoration: underline;
  }

  .product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    margin-bottom: 2rem;
  }

  .product-image-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .product-image-main {
    width: 100%;
    max-width: 400px;
    height: 400px;
    background-color: #f9f9f9;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .product-image-main img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .product-info-section {
    display: flex;
    flex-direction: column;
  }

  .product-title {
    font-size: 2rem;
    color: #003d7a;
    font-weight: bold;
    margin-bottom: 1rem;
  }

  .product-rating {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
    font-size: 0.95rem;
  }

  .rating-stars {
    color: #ffc107;
    font-size: 1.1rem;
    letter-spacing: 0.2rem;
  }

  .rating-count {
    color: #666;
  }

  .price-section {
    margin: 2rem 0;
    padding: 1.5rem;
    background-color: #f0f8ff;
    border-radius: 8px;
    border-left: 4px solid #28a745;
  }

  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
    font-size: 1rem;
  }

  .price-label {
    color: #666;
    font-weight: 500;
  }

  .old-price {
    text-decoration: line-through;
    color: #999;
    font-size: 1.1rem;
  }

  .discount-badge {
    background-color: #dc3545;
    color: white;
    padding: 0.3rem 0.6rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: bold;
  }

  .current-price {
    font-size: 1.8rem;
    color: #28a745;
    font-weight: bold;
  }

  .action-buttons {
    display: flex;
    gap: 1rem;
    margin: 2rem 0;
  }

  .btn-primary {
    flex: 1;
    background-color: #003d7a;
    color: white;
    border: none;
    padding: 1rem;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  .btn-primary:hover {
    background-color: #002d5a;
  }

  .btn-secondary {
    flex: 1;
    background-color: white;
    color: #003d7a;
    border: 2px solid #003d7a;
    padding: 1rem;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-secondary:hover {
    background-color: #f0f0f0;
  }

  .seller-info-section {
    margin-top: 2rem;
    padding: 1.5rem;
    background-color: #f9f9f9;
    border-radius: 8px;
    border: 1px solid #e0e0e0;
  }

  .seller-info-title {
    font-size: 1.1rem;
    color: #003d7a;
    font-weight: bold;
    margin-bottom: 1rem;
  }

  .seller-card {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
