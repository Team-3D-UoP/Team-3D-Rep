{% extends "base.html" %}

{% block title %}{{ product.name }} - Team 3D{% endblock %}

{% block content %}
<style>
  .product-detail-container {
    max-width: 1200px;
    margin: 2rem auto;
    background-color: white;
    border-radius: 12px;
    padding: 2rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .breadcrumb {
    margin-bottom: 2rem;
    font-size: 0.9rem;
  }

  .breadcrumb a {
    color: #007bff;
    text-decoration: none;
  }

  .breadcrumb a:hover {
    text-decoration: underline;
  }

  .product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    margin-bottom: 2rem;
  }

  .product-image-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .product-image-main {
    width: 100%;
    max-width: 400px;
    height: 400px;
    background-color: #f9f9f9;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .product-image-main img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .product-info-section {
    display: flex;
    flex-direction: column;
  }

  .product-title {
    font-size: 2rem;
    color: #003d7a;
    font-weight: bold;
    margin-bottom: 1rem;
  }
