<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }
        
        .header {
            background: white;
            padding: 20px 40px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .breadcrumb {
            font-size: 14px;
            color: #666;
        }
        
        .breadcrumb a {
            color: #0052cc;
            text-decoration: none;
        }
        
        .breadcrumb strong {
            color: #0052cc;
        }
        
        .container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            gap: 30px;
            padding: 40px;
        }
        
        .sidebar {
            width: 250px;
            flex-shrink: 0;
        }
        
        .sidebar-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        .nav-item {
            padding: 14px 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            background-color: transparent;
        }
        
        .nav-item:hover {
            background-color: #f5f5f5;
        }
        
        .nav-item.active {
            background-color: #e8ecff;
            color: #0052cc;
            border: 2px solid #0052cc;
            font-weight: 600;
        }
        
        .icon {
            font-size: 20px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .main-content {
            flex: 1;
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #003d7a;
        }
        
        .back-link {
            color: #0052cc;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        .form-card h2 {
            font-size: 20px;
            font-weight: 700;
            color: #003d7a;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #0052cc;
            box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn-primary {
            flex: 1;
            padding: 12px 24px;
            background-color: #0052cc;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-primary:hover {
            background-color: #0041a3;
        }
        
        .btn-secondary {
            flex: 1;
            padding: 12px 24px;
            background-color: #e8e8e8;
            color: #333;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-secondary:hover {
            background-color: #d0d0d0;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
            }
            
            .form-card {
                padding: 30px;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="breadcrumb">
            <a href="/">Home</a> / <a href="/account">My Account</a> / <strong>Personal Details</strong>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <div class="sidebar-card">
                <a href="/account" class="nav-item">
                    <span class="icon">📊</span>
                    <span>Account Overview</span>
                </a>
                <a href="/my-orders" class="nav-item">
                    <span class="icon">🛍️</span>
                    <span>My Orders</span>
                </a>
                <a href="/personal-details" class="nav-item active">
                    <span class="icon">👤</span>
                    <span>Personal Details</span>
                </a>
                <a href="/wishlist" class="nav-item">
                    <span class="icon">❤️</span>
                    <span>My Wish List</span>
                </a>
            </div>
        </div>
        
        <!-- Main Content Area -->
        <div class="main-content">
            <div class="content-header">
                <h1 class="page-title">Personal Details</h1>
                <a href="/account" class="back-link">← Back to My Account</a>
            </div>
            
            <!-- Edit Form Card -->
            <div class="form-card">
                <h2>Edit Personal Details</h2>
                <form method="POST" action="/update-account">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Alper Ozdemir" value="{{ username }}">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="up2264072@myport.ac.uk" value="{{ email }}">
                    </div>
                    
                    <div class="form-group">
                        <label for="full-name">Full Name</label>
                        <input type="text" id="full-name" name="full_name" placeholder="Alper Ozdemir" value="{{ full_name }}">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">New Password (leave blank to keep current)</label>
                        <input type="password" id="password" name="password" placeholder="Enter new password">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm new password">
                    </div>
                    
                    <div class="button-group">
                        <button type="submit" class="btn-primary">Save Changes</button>
                        <button type="reset" class="btn-secondary">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
