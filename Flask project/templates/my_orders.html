<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }
        
        .header {
            background: white;
            padding: 20px 40px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .breadcrumb {
            font-size: 14px;
            color: #666;
        }
        
        .breadcrumb a {
            color: #0052cc;
            text-decoration: none;
        }
        
        .breadcrumb strong {
            color: #0052cc;
        }
        
        .container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            gap: 30px;
            padding: 40px;
        }
        
        .sidebar {
            width: 250px;
            flex-shrink: 0;
        }
        
        .sidebar-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        .nav-item {
            padding: 14px 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            background-color: transparent;
        }
        
        .nav-item:hover {
            background-color: #f5f5f5;
        }
        
        .nav-item.active {
            background-color: #e8ecff;
            color: #0052cc;
            border: 2px solid #0052cc;
            font-weight: 600;
        }
        
        .icon {
            font-size: 20px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .main-content {
            flex: 1;
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #003d7a;
        }
        
        .back-link {
            color: #0052cc;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 30px;
        }
        
        .tab-button {
            padding: 15px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #666;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }
        
        .tab-button:hover {
            color: #333;
        }
        
        .tab-button.active {
            color: #0052cc;
            border-bottom-color: #0052cc;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .orders-table {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        .table-header {
            padding: 20px 30px;
            border-bottom: 1px solid #e0e0e0;
            display: grid;
            grid-template-columns: 150px 150px 150px 150px;
            gap: 30px;
            font-weight: 600;
            color: #666;
            font-size: 13px;
        }
        
        .table-row {
            padding: 20px 30px;
            border-bottom: 1px solid #e0e0e0;
            display: grid;
            grid-template-columns: 150px 150px 150px 150px;
            gap: 30px;
            align-items: center;
            transition: background-color 0.3s;
        }
        
        .table-row:last-child {
            border-bottom: none;
        }
        
        .table-row:hover {
            background-color: #f9f9f9;
        }
        
        .table-cell {
            font-size: 14px;
            color: #333;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-processing {
            background-color: #fff4e6;
            color: #d97706;
        }
        
        .status-delivered {
            background-color: #dcfce7;
            color: #16a34a;
        }
        
        .status-cancelled {
            background-color: #fee2e2;
            color: #dc2626;
        }
        
        .empty-state {
            padding: 60px 30px;
            text-align: center;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
            }
            
            .table-header,
            .table-row {
                grid-template-columns: 1fr;
            }
            
            .content-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="breadcrumb">
            <a href="/">Home</a> / <a href="/account">My Account</a> / <strong>My Orders</strong>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <div class="sidebar-card">
                <a href="/account" class="nav-item">
                    <span class="icon">📊</span>
                    <span>Account Overview</span>
                </a>
                <a href="/my-orders" class="nav-item active">
                    <span class="icon">🛍️</span>
                    <span>My Orders</span>
                </a>
                <a href="/personal-details" class="nav-item">
                    <span class="icon">👤</span>
                    <span>Personal Details</span>
                </a>
                <a href="/wishlist" class="nav-item">
                    <span class="icon">❤️</span>
                    <span>My Wish List</span>
                </a>
            </div>
        </div>
        
        <!-- Main Content Area -->
        <div class="main-content">
            <div class="content-header">
                <h1 class="page-title">My Orders</h1>
                <a href="/account" class="back-link">← Back to My Account</a>
            </div>
            
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab(event, 'delivery')">Delivery</button>
                <button class="tab-button" onclick="switchTab(event, 'collection')">Collection</button>
            </div>
            
            <!-- Delivery Tab -->
            <div id="delivery" class="tab-content active">
                <div class="orders-table" id="deliveryOrders">
                    <div style="padding: 30px; text-align: center; color: #666;">Loading orders...</div>
                </div>
            </div>

            <!-- Collection Tab -->
            <div id="collection" class="tab-content">
                <div class="orders-table" id="collectionOrders">
                    <div style="padding: 30px; text-align: center; color: #666;">No collection orders yet</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function switchTab(event, tabName) {
            // Hide all tabs
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active'));

            // Remove active class from all buttons
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => btn.classList.remove('active'));

            // Show selected tab and mark button as active
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Load orders from Firebase
        async function loadOrders() {
            try {
                const response = await fetch('/api/orders/user-orders');
                const data = await response.json();

                if (response.status === 401) {
                    // User not logged in
                    document.getElementById('deliveryOrders').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🔒</div>
                            <p>Please log in to view your orders</p>
                            <a href="{{ url_for('login') }}" style="color: #0052cc; text-decoration: none; font-weight: 600;">Log In</a>
                        </div>
                    `;
                    document.getElementById('collectionOrders').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🔒</div>
                            <p>Please log in to view your orders</p>
                        </div>
                    `;
                    return;
                }

                const orders = data.orders || [];

                // Separate orders by delivery method
                const deliveryOrders = orders.filter(o => o.delivery_method === 'delivery');
                const collectionOrders = orders.filter(o => o.delivery_method === 'collection');

                // Render delivery orders
                renderOrders('deliveryOrders', deliveryOrders);

                // Render collection orders
                renderOrders('collectionOrders', collectionOrders);

            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('deliveryOrders').innerHTML = `
                    <div class="empty-state">
                        <p>Error loading orders. Please try again.</p>
                    </div>
                `;
            }
        }

        function renderOrders(containerId, orders) {
            const container = document.getElementById(containerId);

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <p>No orders yet</p>
                    </div>
                `;
                return;
            }

            // Build table HTML
            let html = `
                <div class="table-header">
                    <div>Order ID</div>
                    <div>Date</div>
                    <div>Total</div>
                    <div>Status</div>
                </div>
            `;

            orders.forEach(order => {
                const date = new Date(order.created_at).toLocaleDateString('en-GB');
                const statusClass = `status-${order.status.toLowerCase()}`;
                const statusDisplay = order.status.charAt(0).toUpperCase() + order.status.slice(1);

                html += `
                    <div class="table-row">
                        <div class="table-cell">#${order.order_id}</div>
                        <div class="table-cell">${date}</div>
                        <div class="table-cell">£${parseFloat(order.total).toFixed(2)}</div>
                        <div class="table-cell"><span class="status-badge ${statusClass}">${statusDisplay}</span></div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Load orders on page load
        loadOrders();
    </script>
</body>
</html>
