{% extends "base.html" %}

{% block title %}Chat - Team 3D{% endblock %}

{% block content %}
<style>
  body {
    background-color: #f0f0f0;
  }

  .chat-coaaaaner {
    max-width: 800px;
    margin: 2rem auto;
    background-color: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 90vh;
    max-height: 700px;
  }

  .chat-header {
    background-color: #003d7a;
    color: white;
    padding: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #002d5a;
  }

  .chat-title {
    font-size: 1.3rem;
    font-weight: bold;
  }

  .chat-status {
    font-size: 0.9rem;
    opacity: 0.9;
  }

  .chat-body {
    flex: 1;
    padding: 1.5rem;
    overflow-y: auto;
    background-color: #fafafa;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .chat-message {
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.95rem;
    line-height: 1.5;
    max-width: 85%;
    word-wrap: break-word;
  }

  .chat-message-user {
    background-color: #003d7a;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 2px;
  }
