<script>
  // Wait for DOM to be fully loaded
  function initializeHomepage() {
    // Store current user email for chat
    let currentUserEmail = null;
    let currentUserName = null;

  // Get user email from session/localStorage
  function getCurrentUserInfo() {
    // Try to get from localStorage (set during login)
    const storedEmail = localStorage.getItem('userEmail');
    const storedName = localStorage.getItem('userName');

    if (storedEmail) {
      currentUserEmail = storedEmail;
      currentUserName = storedName || 'Guest User';
      return { email: storedEmail, name: storedName };
    }

    // Fallback if not logged in
    return { email: 'guest@example.com', name: 'Guest User' };
  }

  // Initialize user info on page load
  getCurrentUserInfo();

  // Search filter functionality
  const searchInput = document.getElementById('searchInput');
  const clearBtn = document.getElementById('clearBtn');
  const offerCards = document.querySelectorAll('.offer-card');

  function filterOffers() {
    const searchTerm = searchInput.value.toLowerCase().trim();

    offerCards.forEach(card => {
      const productName = card.querySelector('.offer-name').textContent.toLowerCase();

      if (searchTerm === '' || productName.includes(searchTerm)) {
        card.style.display = 'block';
      } else {
        card.style.display = 'none';
      }
    });
  }

  searchInput.addEventListener('input', filterOffers);

  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    filterOffers();
    searchInput.focus();
  });

  // Review carousel functionality
  let currentReviewIndex = 0;
  const reviewCards = document.querySelectorAll('.review-card');
  const totalReviews = reviewCards.length;
  let autoRotateInterval;

  function getReviewsPerPage() {
    if (window.innerWidth >= 1200) return 4;
    if (window.innerWidth >= 768) return 2;
    return 1;
  }

  function showReviews() {
    const reviewsPerPage = getReviewsPerPage();
    reviewCards.forEach((card, index) => {
      card.style.display = 'none';
    });

    for (let i = 0; i < reviewsPerPage && currentReviewIndex + i < totalReviews; i++) {
      reviewCards[currentReviewIndex + i].style.display = 'block';
    }
  }

  function nextReview() {
    const reviewsPerPage = getReviewsPerPage();
    currentReviewIndex = (currentReviewIndex + reviewsPerPage) % totalReviews;
    showReviews();
  }

  function prevReview() {
    const reviewsPerPage = getReviewsPerPage();
    currentReviewIndex = (currentReviewIndex - reviewsPerPage + totalReviews) % totalReviews;
    showReviews();
  }

  function startAutoRotate() {
    autoRotateInterval = setInterval(nextReview, 4000);
  }

  function resetAutoRotate() {
    clearInterval(autoRotateInterval);
    startAutoRotate();
  }

  document.querySelector('.review-arrow-prev').addEventListener('click', () => {
    prevReview();
    resetAutoRotate();
  });

  document.querySelector('.review-arrow-next').addEventListener('click', () => {
    nextReview();
    resetAutoRotate();
  });

  window.addEventListener('resize', () => {
    showReviews();
  });

  showReviews();
  startAutoRotate();

  // Chat modal functionality with localStorage persistence
  const chatBtn = document.getElementById('chatBtn');
  const chatModal = document.getElementById('chatModal');
  const chatModalClose = document.getElementById('chatModalClose');
  const chatInput = document.querySelector('.chat-input');
  const chatSendBtn = document.querySelector('.chat-send-btn');
  const chatMessages = document.querySelector('.chat-messages');
  const chatCounter = document.querySelector('.chat-counter');

  // Debug: Log chat elements
  console.log('Chat button element:', chatBtn);
  console.log('Chat modal element:', chatModal);
  console.log('Chat input element:', chatInput);
  console.log('Chat send button element:', chatSendBtn);

  // Display a message in the chat UI
  function displayMessage(text, sender, timestamp) {
    if (!chatMessages) {
      console.warn('⚠️ Chat messages container not found');
      return;
    }
    const msgDiv = document.createElement('div');
    const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    msgDiv.className = `chat-message ${sender === 'support' ? 'chat-message-company' : 'chat-message-user'}`;
    msgDiv.innerHTML = `
      <div>${text}</div>
      <div class="chat-message-time">${time}</div>
    `;
    chatMessages.appendChild(msgDiv);
  }

  // Load chat history from Firebase on modal open
  async function loadChatHistoryFromStorage() {
    try {
      const userInfo = getCurrentUserInfo();
      console.log('🔄 Loading chat messages...');

      // Load from Firebase
      const response = await fetch('/api/chat/get-customer-messages');
      if (response.ok) {
        const data = await response.json();
        console.log(`📨 Received ${data.messages?.length || 0} messages from Firebase`);

        // Clear existing messages except the initial greeting
        const initialMsg = chatMessages.querySelector('.chat-message-company');
        chatMessages.innerHTML = '';
        if (initialMsg) chatMessages.appendChild(initialMsg);

        // Load messages from Firebase - filter by current user
        if (data.messages && data.messages.length > 0) {
          data.messages.forEach(msg => {
            // Show message if:
            // 1. It's from the current user, OR
            // 2. It's a reply from admin targeted to this user, OR
            // 3. User not logged in (show all messages)
            const isCurrentUser = msg.user_email === userInfo.email;
            const isAdminReply = msg.sender_type === 'admin';
            const isTargetedToUser = msg.target_user_email === userInfo.email || !msg.target_user_email;
            const isGuestUser = userInfo.email === 'guest@example.com';

            if (isCurrentUser || (isAdminReply && isTargetedToUser) || isGuestUser) {
              console.log(`✓ Displaying: ${msg.sender_type} - ${msg.message.substring(0, 30)}`);
              displayMessage(msg.message, msg.sender_type === 'admin' ? 'support' : 'user', msg.created_at);
            }
          });
        }
      }
    } catch (error) {
      console.error('Error loading chat history:', error);
    }

    // Update counter
    if (chatMessages && chatCounter) {
      const messageCount = chatMessages.children.length;
      chatCounter.textContent = `${messageCount} of ${messageCount}`;

      // Scroll to bottom
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
  }


  // Send message handler
  function sendMessage() {
    if (!chatInput) return;

    const messageText = chatInput.value.trim();
    if (!messageText) return;

    // Display user message immediately
    displayMessage(messageText, 'user', new Date().toISOString());
    chatInput.value = '';

    // Update message counter
    if (chatMessages && chatCounter) {
      let messageCount = chatMessages.children.length;
      chatCounter.textContent = `${messageCount} of ${messageCount}`;

      // Scroll to bottom
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Send to backend
    const userInfo = getCurrentUserInfo();
    fetch('/api/chat/send', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: messageText,
        email: userInfo.email,
        name: userInfo.name
      })
    }).then(response => {
      if (response.ok) {
        console.log('✓ Message sent to support team');
        // Show response after 2 seconds
        setTimeout(() => {
          const supportResponse = 'Thank you for your message! Our support team will reply shortly.';
          displayMessage(supportResponse, 'support', new Date().toISOString());

          if (chatMessages && chatCounter) {
            messageCount = chatMessages.children.length;
            chatCounter.textContent = `${messageCount} of ${messageCount}`;
            chatMessages.scrollTop = chatMessages.scrollHeight;
          }
        }, 2000);
      }
    }).catch(error => {
      console.error('Error sending message:', error);
    });
  }

  // Auto-refresh chat messages
  let chatRefreshInterval;

  // Only attach listener if button exists
  if (chatBtn) {
    chatBtn.addEventListener('click', () => {
      console.log('💬 Chat button clicked on homepage');
      try {
        if (chatModal) {
          loadChatHistoryFromStorage();
          chatModal.classList.add('active');
          console.log('✓ Chat modal opened successfully');

          // Auto-refresh messages every 2 seconds while modal is open
          if (chatRefreshInterval) clearInterval(chatRefreshInterval);
          chatRefreshInterval = setInterval(() => {
            loadChatHistoryFromStorage();
          }, 2000);
        } else {
          console.error('❌ Chat modal not found');
        }
      } catch (error) {
        console.error('❌ Error opening chat:', error);
      }
    });
    console.log('✓ Chat button event listener attached');
  } else {
    console.error('❌ Chat button not found in DOM');
  }

  // Attach remaining event listeners
  if (chatModalClose) {
    chatModalClose.addEventListener('click', () => {
      console.log('Closing chat modal');
      if (chatModal) {
        chatModal.classList.remove('active');
        clearInterval(chatRefreshInterval);
      }
    });
  }

  if (chatModal) {
    chatModal.addEventListener('click', (e) => {
      if (e.target === chatModal) {
        console.log('Closing chat (clicked outside)');
        chatModal.classList.remove('active');
        clearInterval(chatRefreshInterval);
      }
    });
  }

  if (chatSendBtn) {
    chatSendBtn.addEventListener('click', sendMessage);
  }

  if (chatInput) {
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
  }
  } // End of initializeHomepage function

  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeHomepage);
  } else {
    // DOM is already loaded
    initializeHomepage();
  }
</script>
