<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 2rem; }
        form { display: grid; gap: 0.75rem; max-width: 320px; }
        label { display: block; }
        input[type="number"], input[type="text"], input[type="password"] { padding: 0.75rem; font-size: 1rem; width: 100%; box-sizing: border-box; margin-top: 0.5rem; }
        button { padding: 0.6rem 0.9rem; font-size: 1rem; cursor: pointer; }
        .result { margin-top: 1rem; font-weight: 600; }
        .error { margin-top: 1rem; }
    </style>
</head>
<body>
    <h1>User Login</h1>
</body>
</html>

<form id="login-form" method="POST">
    <label for="username">
        Username
        <input type="text" id="username" name="username" placeholder="Enter your username" required />
    </label>

    <label for="password">
        Password
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
    </label>

    <button type="submit">Login</button>

    <div class="divider">or</div>

</form>
